<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resume</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f5f5f5;
        }

        h1{
            text-align:center;
            margin-top:20px;
        }

        .resume-container{
            width:90%;
            height:80vh;
            margin:auto;
        }

        iframe{
            width:100%;
            height:100%;
            border:none;
        }

        .download-btn{
            display:block;
            width:220px;
            margin:20px auto;
            padding:15px;
            text-align:center;
            text-decoration:none;
            background:#007BFF;
            color:white;
            border-radius:8px;
            font-size:18px;
        }

        .download-btn:hover{
            background:#0056b3;
        }
    </style>

</head>
<body>

<h1>My Resume</h1>

<div class="resume-container">

<iframe src="ASWINNIDESH.resume .pdf"></iframe>

</div>

<a href="ASWINNIDESH.resume .pdf"
   download="ASWINNIDESH.resume .pdf"
   class="download-btn">
   Download Resume
</a>

</body>
